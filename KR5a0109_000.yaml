front:
  text: 黃帝陰符經注序藏六
  hash: sha256:40dc5b8b92d69c78247c64306aae2a0511faeb9d3e6356dbae0c2ac4b6ab6fdc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0109_HFL_000-001a, image: hfl/0054/0054-070.png}
body:
  text: 蜀相諸葛亮撰所謂命者性也性能命通故聖人尊之以天命愚其人而智其聖故曰天機張而不死地機弛而不生觀乎陰符造化在乎手生死在乎人故聖人藏之於心所以陶甄天地聚散天下而不見其跡者天機也故黃帝得之以登雲天湯武得之以王天下五霸得之以統諸侯夫臣易而主難不可以輕用太公九十非不遇蓋審其主焉若使哲士執而用之立石為主刻木為君亦可以享天下夫臣盡其心而主反怖有之不亦難乎嗚呼無賢君則義士自死而不仕莫若散志巖石以養其命待生於泰階世人以夫子為不遇以秦儀為得時不然志在立宇宙安能馳心下走哉文夫所恥嗚呼後世英哲審而用之范蠡重而長文種輕而亡豈不為泄天機天機泄者沉三劫宜然故聖人藏諸名山傳之同好隱之金匱恐小人竊而弄之黃帝陰符經集注伊尹太公范蠡鬼谷子諸葛亮張良李筌注觀天之道執天之行盡矣序首故天有五賊見之者昌太公曰其一賊命其次賊物其次賊時其次賊功其次賊神賊命以一消天下用之以味賊物以一急天下用之以利賊時以一信天下用之以反賊功以一恩天下用之以怨賊神以一驗天下用之以小大鬼谷子曰天之五賊莫若賊神此大而彼小以小而取大天地莫之能神而沉於人乎筌曰黃帝得賊命之機白日上升殷周得賊神之驗以小滅大管仲得賊時之信九合諸侯范蠡得賊物之急而霸南越張良得賊功之恩而敗强楚五賊在乎心施行乎天宇宙在乎手萬化生乎身太公曰聖人謂之五賊天下謂之五德人食五味而生食五味而死無有怨而棄之者也心之所味也亦然鬼谷子曰賊命可以長生不死黃帝以少女精氣感之時物亦然且經冬之草覆之而不死露之即見傷草木植性尚猶如此況人萬物之靈其機則少女以時廣成子曰以為積火焚五毒五毒即五味五味盡可以長生也筌曰人因五味而生五味而死五味各有所主順之則相生逆之則相勝久之則積氣薰蒸人腐五臟殆至滅亡代人所以不能終其天年者以其生生之厚矣是以至道淡然胎息無味神仙之術百數其要在抱一守中少女之術百數其要在還精採氣金丹之術百數其要在神水華池治國之術百數其要在清淨自化用兵之術百數其要在竒正權謀此五事者卷之藏於心隱於神施之彌於天絡於地宇宙瞬息可在人之手萬物榮枯可生人之身黃帝得之先固三宫後治萬國鼎成而馭龍上升於天也天性人也人心機也立天之道以定人也亮曰以為立天定人其在於五賊天發殺機龍蛇起陸人發殺機天地反覆范曰昔伊尹佐殷發天殺之機克夏之命盡而事應之故有東征西夷怨南征北狄怨太公曰不耕三年大旱不鑒十年地壞殺人過萬大風暴起亮曰按楚殺漢兵數萬大風杳冥晝晦有若天地反覆天人合發萬變定基良曰從此一信而萬信生故為萬變定基矣筌曰大荒大亂兵水旱蝗是天殺機也虞舜陶甄夏禹拯骸殷繫夏臺周囚羑里漢祖亭長魏武乞丐俱非王者之位乘天殺之機也起陸而帝君子在野小人在位權臣擅威百姓思亂人殺機也成湯放桀周武伐紂項籍斬嬴嬰魏廢劉協是乘人殺之機也覆貴為賤反賤為貴有若天地反覆天人之機合發成敗之理宜然萬變千化聖人因之而定基業也性有巧拙可以伏藏良曰聖人見其巧拙彼此不利者其計在心彼此利者聖哲英雄道焉況用兵之務哉筌曰中欲不出謂之啓外邪不入謂之閉外閉內啓是其機也難知如陰不動如山巧拙之性使人無間而得窺也九竅之邪在乎三要可以動靜太公曰三要者耳目口也耳可鑿而塞目可穿而眩口可利而訥興師動衆萬夫莫議其奇在三者或可動或可靜之筌曰兩葉掩目不見泰山雙豆塞耳不聞雷霆一椒掠舌不能立言九竅皆邪不足以察機變其在三者神心志也機動未眹神以隨之機兆將成心以圖之機發事行志以斷之其機動也與陽同其波五嶽不能鎮其隅四瀆不能界其維其機靜也與陰同其德智士不能運其榮深聞不能竅其謀天地不能奪其時而況於人乎火生於木禍發必尅奸生於國時動必潰知之修鍊謂之聖人筌曰火生於木火發而木焚奸生於國奸成而國滅木中藏火火始於無形國中藏奸奸始於無象非至聖不能修身鍊行使奸火之不發夫國有無軍之兵無災之禍矣以箕子逃而縛裘牧商容囚而蹇叔哭天生天殺道之理也良曰機出乎心如天之生如天之殺則生者自謂得其生死者自謂得其死天地萬物之盜萬物人之盜人萬物之盜三盜既宜三才既安鬼谷子曰三盜者彼此不覺知但謂之神明此三者況車馬金帛棄之可以傾河填海移山覆地非命而動然後應之筌曰天地與萬物生成盜萬物以衰老萬物與人之服御盜人以驕奢人與萬物之上器盜萬物以毁敗皆自然而往三盜各得其宜三才遞安其任故曰食其時百骸理動其機萬化安鬼谷子曰不欲今後代人君廣斂珍寶委積金帛若能棄之雖傾河填海未足難也食者所以治百骸失其時而生百病動者所以安萬物失其機而傷萬物故曰時之至間不容瞬息先之則太過後之則不及是以賢者守時不肖者守命也人知其神而神不知其神所以神也筌曰人皆有聖人之聖不貴聖人之愚既睹其聖又察其愚既睹其愚復睹其聖故書曰專用聰明則事不成專用晦昧則事皆勃一明一晦衆之所載伊尹酒保太公屠牛管仲作革百里奚賣粥當衰亂之時人皆謂之不神及乎逢成湯遭文王遇齊桓值秦穆道濟生靈功格宇宙人皆謂之至神日月有數大小有定聖功生焉神明出焉鬼谷子曰後代伏思之則明天地不足貴而況於人乎筌曰一歲三百六十五日日之有數月次十二以積閏大小餘分有定皆禀精氣自有不為聖功神明而生聖功神明亦禀精氣自有不為日月而生是故成不貴乎天地敗不怨乎陰陽其盜機也天下莫能知君子得之固躬小人得之輕命諸葛亮曰天子太公豈不賢於孫吳韓白所以君子小人異之四子之勇至於殺身固不得其主而見殺矣筌曰季主凌夷天下莫見凌夷之機而莫能知凌夷之源霸王開國之機而莫能知開國之源君子得其機應天順人乃固其躬小人得其機煩兵黷武乃輕其命易曰君子見機而作不俟終日又曰知機其神乎機者易見而難知見近知遠瞽者善聽聾者善視絶利一源用師十倍三反晝夜用師萬倍尹曰思之精所以盡其微良曰後代伏思之耳目之利絶其一源筌曰人之耳目皆分於心而竟於神心分則機不精神竟則機不微是以師曠薰目而聰耳離朱漆耳而明目任一源之利而反用師於心舉事發機十全成也退思三反經晝歷夜思而後行舉事發機萬全成也太公曰目動而心應之見可則行見否則止心生於物死於物機在於目筌曰為天下機者莫近乎心目心能發目目能見機秦始皇東遊會稽項羽目見其機心生於物謂項良曰彼可取而代之晋師畢至於淮淝符堅目見其機心死於物謂符融曰彼勍敵也胡為少耶則知生死之心在乎物成敗之機見於目焉天之無恩而大恩生迅雷烈風莫不蠢然良曰熙熙哉太公曰誡懼致福筌曰天心無恩萬物有心歸恩於天老子曰天地不仁以萬物為芻狗聖人不仁以百姓為芻狗是以施而不求其報生而不有其功及至迅雷烈風威遠而懼邇萬物蠢然而懷懼天無威而懼萬物萬物有懼而歸威於天聖人行賞也無恩於有功行伐也無威於有罪故賞罰自立於上威恩自行於下也至樂性餘至靜性廉良曰夫機在於是也筌曰樂則奢餘靜則貞廉性餘則神濁性廉則神清神者智之泉神清則智明智者心之府智公則心平人莫鑒於流水而鑒於澄水以其清且平神清意平乃能形物之情夫聖人者不淫於至樂不安於至靜能棲神淨樂之間謂之守中如此施利不能誘聲色不能蕩辨士不能說智者不能動勇者不能懼見禍於重開之外慮患於杳冥之內天且不違而況於兵之詭道者哉天之至私尹曰治極微用之至公良曰其機善雖不令天下而行之天下所不能知天下所不能違筌曰天道曲成萬物而不遺椿菌鵬鷃臣細修短各得其所至私也雲行雨施雷電霜霓生殺之均至公也聖人則天法地養萬民察勞苦至私也行正令施法象至公也孫武曰視卒如愛子可以俱死視卒如嬰兒可與之赴深溪愛而不能令譬若驕子是故令之以文齊之以武禽之制在氣太公曰豈以小大而相制哉尹曰氣者天之機筌曰玄龜食蟒鸇隼擊鵠黃腰啖虎飛鼠斷猿蜍蛭嚌魚狼犿嚙鶴餘甘柔金河車服之無窮化玉雄黃變鐵有不灰之木浮水之石夫禽獸木石得其氣尚能以小制大況英雄得其氣而不能淨寰海而御宇宙也生者死之根死者生之根恩生於害害生於恩太公曰損己者物愛之厚己者物薄之筌曰謀生者必先死而後生習死者必先生而後死鶡冠子曰不死不生不斷不成孫武曰投之死地而後生致之亡地而後存吳起曰兵戰之場立尸之地必死則生幸生則死恩者害之源害者恩之源吳樹恩於越而害生周立害於殷而思生死之與生也恩之與害相反糾纏也愚人以天地文理聖我以時物文理哲太公曰觀鳥獸之時察萬物之變筌曰景星見黃龍下翔鳳至醴泉出嘉穀生河不滿溢海不揚波日月薄蝕五星失行四時相錯晝冥宵光山崩川涸冬雷夏霜愚人以此天地文理為理亂之機文思安安光被四表克明俊德以親九族六府三事無相奪倫百穀用成兆民用康昏主邪臣法令不一重賦苛政上下相蒙懿戚貴臣驕奢淫縱酣酒嗜音峻宇雕墻百姓流亡思亂怨上我以此時物文理為理亂之機也人以虞愚我以不虞愚人以期其聖我以不期其聖筌曰賢哲之心深妙難測由巢之跡人或窺之至於應變無方自機轉而不窮之智人豈虞之以跡度心乃為愚者也故曰沉水入火自取滅亡良曰理人自死理軍亡兵無死則無不死無生則無不生故知乎死生國家安寧自然之道靜故天地萬物生尹曰靜之至不知所以生天地之道浸故陰陽勝良曰天地之道浸微而推勝之陰陽相推變化順矣良曰陰陽相推激至於變化在於目是故聖人知自然之道不可違因而制之良曰大人見之為自然英哲見之為制愚者見之為化尹曰知自然之道萬物不能違故利而行之至淨之道律曆所不能契良曰觀鳥獸之時察萬物之變鳥獸至淨律曆所不能契從而機之爰有竒器是生萬象八卦甲子萬一决也神機鬼藏良曰六癸為天藏可以伏藏也陰陽相勝之術昭昭乎進乎象矣亮曰竒器者聖智也天垂象聖人則之推甲子畫八卦考蓍龜稽律曆則鬼神之情陰陽之理昭著乎象無不盡矣亮曰八卦之象申而用之六十甲子轉而用之神出鬼入萬明一矣良曰萬生萬象者心也合藏陰陽之術日月之數昭昭乎在人心矣廣成子曰甲子合陽九之數也卦象出師衆之法出師以律動合鬼神順天應時而用鬼神之道也黃帝陰符經集注
